name: API CI

on:
  push:
    branches: [main]
    paths: ["apps/api/**"]
  pull_request:
    paths: ["apps/api/**"]

defaults:
  run:
    working-directory: apps/api

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

      - name: Test
        run: go test ./...
