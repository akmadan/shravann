name: Worker CI

on:
  push:
    branches: [main]
    paths: ["apps/worker/**"]
  pull_request:
    paths: ["apps/worker/**"]

defaults:
  run:
    working-directory: apps/worker

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check — main
        run: python -m py_compile main.py

      - name: Compile check — agent modules
        run: |
          python -m py_compile agent/__init__.py
          python -m py_compile agent/base.py
          python -m py_compile agent/db.py
          python -m py_compile agent/factory.py
          python -m py_compile agent/crypto.py
