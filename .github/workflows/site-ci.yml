name: Site CI

on:
  push:
    branches: [main]
    paths: ["site/**"]
  pull_request:
    paths: ["site/**"]

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
