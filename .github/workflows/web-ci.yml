name: Web CI

on:
  push:
    branches: [main]
    paths: ["apps/web/**"]
  pull_request:
    paths: ["apps/web/**"]

defaults:
  run:
    working-directory: apps/web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_SESSION_APP_URL: http://localhost:3001
