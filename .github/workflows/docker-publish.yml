name: Docker Publish

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: akshitmadan/shravann

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: api
            context: apps/api
          - app: worker
            context: apps/worker
          - app: web
            context: apps/web
            build-args: |
              NEXT_PUBLIC_API_URL=__NEXT_PUBLIC_API_URL__
              NEXT_PUBLIC_SESSION_APP_URL=__NEXT_PUBLIC_SESSION_APP_URL__
          - app: session
            context: apps/session
            build-args: |
              NEXT_PUBLIC_API_URL=__NEXT_PUBLIC_API_URL__
              NEXT_PUBLIC_LIVEKIT_URL=__NEXT_PUBLIC_LIVEKIT_URL__

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:latest
          build-args: ${{ matrix.build-args || '' }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
