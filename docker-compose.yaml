services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_shravann
    ports:
      - "5488:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: akshitmadan/shravann-api:latest
    restart: unless-stopped
    ports:
      - "8484:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/db_shravann?sslmode=disable
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}

  worker:
    image: akshitmadan/shravann-worker:latest
    restart: unless-stopped
    profiles: ["voice"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/db_shravann?sslmode=disable
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}

  web:
    image: akshitmadan/shravann-web:latest
    restart: unless-stopped
    ports:
      - "3700:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8484
      NEXT_PUBLIC_SESSION_APP_URL: http://localhost:3701

  session:
    image: akshitmadan/shravann-session:latest
    restart: unless-stopped
    profiles: ["voice"]
    ports:
      - "3701:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8484
      NEXT_PUBLIC_LIVEKIT_URL: ${LIVEKIT_URL:-}

volumes:
  pgdata:
