openapi: 3.0.3
info:
  title: Shravann API
  description: API for projects, agents, and sessions. Use header `X-User-ID` (user UUID) for project/agent creation and listing.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local

tags:
  - name: Health
  - name: Users
  - name: Projects
  - name: Members
  - name: Agents
  - name: Sessions

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK

  /users:
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, auth_provider, auth_provider_id]
              properties:
                email: { type: string, format: email }
                name: { type: string }
                avatar_url: { type: string, nullable: true }
                auth_provider: { type: string }
                auth_provider_id: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Users]
      summary: Update user
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                avatar_url: { type: string, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects:
    get:
      tags: [Projects]
      summary: List projects for current user
      parameters:
        - $ref: "#/components/parameters/XUserID"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items: { $ref: "#/components/schemas/Project" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Projects]
      summary: Create project (caller becomes owner)
      parameters:
        - $ref: "#/components/parameters/XUserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string }
                slug: { type: string }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Get project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: Update project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                slug: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Projects]
      summary: Delete project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/members:
    get:
      tags: [Members]
      summary: List project members
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectMember" }
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Members]
      summary: Add project member
      parameters:
        - $ref: "#/components/parameters/XUserID"
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: string, format: uuid }
                role: { type: string, enum: [owner, admin, member], default: member }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_id: { type: string, format: uuid }
                  user_id: { type: string, format: uuid }
                  role: { type: string }
                  joined_at: { type: string, format: date-time }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/members/{userId}:
    patch:
      tags: [Members]
      summary: Update member role
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/MemberUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [owner, admin, member] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_id: { type: string, format: uuid }
                  user_id: { type: string, format: uuid }
                  role: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Members]
      summary: Remove project member
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/MemberUserId"
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/agents:
    get:
      tags: [Agents]
      summary: List agents in project
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items: { $ref: "#/components/schemas/Agent" }
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Agents]
      summary: Create agent
      parameters:
        - $ref: "#/components/parameters/XUserID"
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string }
                slug: { type: string }
                system_prompt: { type: string }
                model: { type: string, default: gpt-4o }
                voice_provider: { type: string, nullable: true }
                voice_config: { type: object }
                language: { type: string, default: en }
                metadata: { type: object }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{id}:
    get:
      tags: [Agents]
      summary: Get agent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Agents]
      summary: Update agent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                slug: { type: string }
                system_prompt: { type: string }
                model: { type: string }
                voice_provider: { type: string, nullable: true }
                voice_config: { type: object }
                language: { type: string }
                metadata: { type: object }
                is_active: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Agents]
      summary: Delete agent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{agentId}/sessions:
    post:
      tags: [Sessions]
      summary: Create session
      parameters:
        - $ref: "#/components/parameters/AgentIdPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                external_user_id: { type: string, nullable: true }
                channel: { type: string, enum: [chat, voice, api], default: chat }
                metadata: { type: object }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [Sessions]
      summary: List sessions for agent
      parameters:
        - $ref: "#/components/parameters/AgentIdPath"
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items: { $ref: "#/components/schemas/Session" }
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{id}:
    get:
      tags: [Sessions]
      summary: Get session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{id}/end:
    post:
      tags: [Sessions]
      summary: End session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProjectId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProjectIdPath:
      name: projectId
      in: path
      required: true
      schema: { type: string, format: uuid }
    MemberUserId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AgentId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    AgentIdPath:
      name: agentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SessionId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    XUserID:
      name: X-User-ID
      in: header
      required: true
      description: UUID of the authenticated user (required for project/agent creation and listing)
      schema: { type: string, format: uuid }

  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        avatar_url: { type: string, nullable: true }
        auth_provider: { type: string }
        auth_provider_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProjectMember:
      type: object
      properties:
        project_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        role: { type: string, enum: [owner, admin, member] }
        joined_at: { type: string, format: date-time }
        email: { type: string }
        name: { type: string }
        avatar_url: { type: string, nullable: true }
    Agent:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        system_prompt: { type: string }
        model: { type: string }
        voice_provider: { type: string, nullable: true }
        voice_config: {}
        language: { type: string }
        metadata: {}
        is_active: { type: boolean }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Session:
      type: object
      properties:
        id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        external_user_id: { type: string, nullable: true }
        channel: { type: string, enum: [chat, voice, api] }
        status: { type: string, enum: [active, ended, error] }
        metadata: {}
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    Error:
      type: object
      properties:
        error: { type: string }

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { error: "invalid JSON" }
    Unauthorized:
      description: Missing or invalid X-User-ID
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { error: "missing X-User-ID header" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { error: "not found" }
